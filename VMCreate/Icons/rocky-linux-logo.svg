  <!-- Multi-peak rocky silhouette -->
  <path d="M8,74
            L22,50 L32,62 L42,38 L50,50
            L58,32 L68,48 L76,40 L92,74 Z"
        fill="white"/>
  <!-- Snow highlights on tallest peaks -->
