<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Alpine Linux: blue background, white mountain silhouette -->
  <rect width="100" height="100" rx="12" fill="#0D597F"/>
  <!-- Main mountain peak -->
  <polygon points="50,10 90,78 10,78" fill="white"/>
  <!-- Snow cap (dark cut-out near top) -->
  <polygon points="50,10 64,40 36,40" fill="#0D597F"/>
  <!-- Secondary right peak -->
  <polygon points="74,44 88,68 60,68" fill="white" opacity="0.65"/>
</svg>
