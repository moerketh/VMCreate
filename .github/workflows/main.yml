name: Build VMCreate

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for MinVer version calculation

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore VMCreate.sln

      - name: Build solution
        run: dotnet build VMCreate.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test VMCreate.sln -c Release --no-build --logger trx --filter "TestCategory!=Integration"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          # MinVer embeds version in the built assembly; extract it
          $dll = Get-ChildItem -Path VMCreate.Gallery.Contracts/bin/Release -Filter "VMCreate.Gallery.Contracts.dll" -Recurse | Select-Object -First 1
          $ver = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($dll.FullName).ProductVersion
          # Strip +sha suffix for clean display version (keeps pre-release tags)
          $cleanVer = ($ver -split '\+')[0]
          # Strip pre-release suffix too for MSI version (must be X.Y.Z)
          $msiVer = $cleanVer -replace '-.*', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "clean_version=$cleanVer" >> $env:GITHUB_OUTPUT
          echo "msi_version=$msiVer" >> $env:GITHUB_OUTPUT
          echo "Version: $ver / Clean: $cleanVer / MSI: $msiVer"

      - name: Publish self-contained executable
        run: >
          dotnet publish VMCreate/VMCreate.csproj
          -c Release
          -r win-x64
          --self-contained
          -o publish

      - name: Build MSI installer
        run: >
          dotnet build VMCreate.Installer/VMCreate.Installer.wixproj
          -c Release
          -p:ProductVersion=${{ steps.version.outputs.msi_version }}
          -p:PublishDir=${{ github.workspace }}/publish/
          -p:SolutionDir=${{ github.workspace }}/

      - name: Generate checksums
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path VMCreate.Installer/bin -Filter "*.msi" -Recurse | Select-Object -First 1
          if (-not $msi) { throw "MSI not found under VMCreate.Installer/bin" }
          $exe = "publish/VMCreate.exe"
          $msiHash = (Get-FileHash $msi.FullName -Algorithm SHA256).Hash
          $exeHash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$msiHash  vmcreate-${{ steps.version.outputs.clean_version }}.msi" | Out-File -Encoding utf8 checksums.sha256
          "$exeHash  vmcreate-${{ steps.version.outputs.clean_version }}.exe" | Add-Content -Encoding utf8 checksums.sha256
          Get-Content checksums.sha256

      - name: Rename artifacts for release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.clean_version }}"
          $msi = Get-ChildItem -Path VMCreate.Installer/bin -Filter "*.msi" -Recurse | Select-Object -First 1
          if (-not $msi) { throw "MSI not found under VMCreate.Installer/bin" }
          Copy-Item $msi.FullName "vmcreate-$ver.msi"
          Copy-Item "publish/VMCreate.exe" "vmcreate-$ver.exe"

      - name: Delete old artifacts
        if: github.ref_type == 'branch'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const artifact of artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: Upload MSI artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: vmcreate-${{ steps.version.outputs.clean_version }}.msi
          retention-days: 5
          path: vmcreate-${{ steps.version.outputs.clean_version }}.msi

      - name: Upload EXE artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: vmcreate-${{ steps.version.outputs.clean_version }}.exe
          retention-days: 5
          path: vmcreate-${{ steps.version.outputs.clean_version }}.exe

      - name: Upload checksums artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: checksums.sha256
          retention-days: 5
          path: checksums.sha256

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: >
            vmcreate-${{ steps.version.outputs.clean_version }}.msi,
            vmcreate-${{ steps.version.outputs.clean_version }}.exe,
            checksums.sha256
          generateReleaseNotes: true
