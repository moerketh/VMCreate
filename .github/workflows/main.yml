name: Build VMCreate

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for MinVer version calculation

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore VMCreate.sln

      - name: Build solution
        run: dotnet build VMCreate.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test VMCreate.sln -c Release --no-build --logger trx

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          # MinVer embeds version in the built assembly; extract it
          $dll = Get-ChildItem -Path VMCreate.Gallery.Contracts/bin/Release -Filter "VMCreate.Gallery.Contracts.dll" -Recurse | Select-Object -First 1
          $ver = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($dll.FullName).ProductVersion
          # Strip +sha suffix for MSI version (must be X.Y.Z)
          $msiVer = ($ver -split '\+')[0] -replace '-.*', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "msi_version=$msiVer" >> $env:GITHUB_OUTPUT
          echo "Version: $ver / MSI: $msiVer"

      - name: Publish self-contained executable
        run: >
          dotnet publish VMCreate/VMCreate.csproj
          -c Release
          -r win-x64
          --self-contained
          -o publish

      - name: Build MSI installer
        run: >
          dotnet build VMCreate.Installer/VMCreate.Installer.wixproj
          -c Release
          -p:ProductVersion=${{ steps.version.outputs.msi_version }}
          -p:PublishDir=${{ github.workspace }}/publish/
          -p:SolutionDir=${{ github.workspace }}/

      - name: Generate checksums
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path VMCreate.Installer/bin/Release -Filter "*.msi" -Recurse | Select-Object -First 1
          $exe = "publish/VMCreate.exe"
          $msiHash = (Get-FileHash $msi.FullName -Algorithm SHA256).Hash
          $exeHash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$msiHash  VMCreate-${{ steps.version.outputs.version }}.msi" | Out-File -Encoding utf8 checksums.sha256
          "$exeHash  VMCreate-${{ steps.version.outputs.version }}.exe" | Add-Content -Encoding utf8 checksums.sha256
          Get-Content checksums.sha256

      - name: Rename artifacts for release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $msi = Get-ChildItem -Path VMCreate.Installer/bin/Release -Filter "*.msi" -Recurse | Select-Object -First 1
          Copy-Item $msi.FullName "VMCreate-$ver.msi"
          Copy-Item "publish/VMCreate.exe" "VMCreate-$ver.exe"

      - name: Upload build artifacts
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: vmcreate-${{ steps.version.outputs.version }}
          path: |
            VMCreate-${{ steps.version.outputs.version }}.msi
            VMCreate-${{ steps.version.outputs.version }}.exe
            checksums.sha256

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: >
            VMCreate-${{ steps.version.outputs.version }}.msi,
            VMCreate-${{ steps.version.outputs.version }}.exe,
            checksums.sha256
          generateReleaseNotes: true
